<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carnet de Recettes</title>
    <link rel="stylesheet" href="/styles.css?v=email-auth-6" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#/" aria-label="Retour à l'accueil">
          <span class="brand-mark">CR</span>
          <span>
            <strong>Carnet de Recettes</strong>
            <small>Simple, maison, partageable</small>
          </span>
        </a>
        <nav class="top-actions" aria-label="Actions principales">
          <span class="welcome-text" id="userWelcome" hidden></span>
          <button class="ghost-button" id="adminStatusButton" type="button" hidden>Connexion</button>
          <button class="ghost-button" id="signOutButton" type="button" hidden>Déconnexion</button>
          <button class="primary-button" id="addRecipeButton" type="button" hidden>Ajouter une recette</button>
        </nav>
      </header>

      <main id="app" tabindex="-1"></main>
    </div>

    <dialog class="admin-dialog" id="adminDialog">
      <form class="admin-card" id="adminForm" method="dialog">
        <button class="icon-button dialog-close" id="closeAdminDialog" type="button" aria-label="Fermer">×</button>
        <p class="eyebrow">Compte utilisateur</p>
        <h2 id="authDialogTitle">Connexion</h2>
        <p class="muted" id="authDialogIntro">Connecte-toi pour ajouter tes recettes.</p>
        <label class="field" id="displayNameField">
          <span>Pseudo</span>
          <input id="displayNameInput" type="text" autocomplete="name" />
        </label>
        <label class="field">
          <span id="authIdentifierLabel">Email</span>
          <input id="adminEmail" type="text" autocomplete="email" required />
        </label>
        <label class="field" id="passwordField">
          <span>Mot de passe</span>
          <input id="adminPassword" type="password" autocomplete="current-password" required />
        </label>
        <p class="form-error" id="adminError" role="alert"></p>
        <button class="primary-button full-width" id="authSubmitButton" type="submit">Se connecter</button>
        <button class="secondary-button full-width" id="forgotPasswordButton" type="button">Mot de passe oublié</button>
        <button class="ghost-button full-width" id="toggleAuthModeButton" type="button">Créer un compte</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/app.js?v=servings-author-1" defer></script>
  </body>
</html>
